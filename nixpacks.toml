[variables]
PYTHONUNBUFFERED = "1"
NIXPACKS_PYTHON_PACKAGE_MANAGER = "uv"
NIXPACKS_UV_VERSION = "0.8.14"

[phases.setup]
nixPkgs = ["python314", "uv"]

[phases.install]
dependsOn = ["setup"]
cmds = [
    "python -m venv --copies /opt/venv && . /opt/venv/bin/activate && pip install uv==$NIXPACKS_UV_VERSION && uv sync --frozen --no-dev",
]

[start]
cmd = "uv run python -m main.py"
